<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CV - Cassandra Davis</title>
  <link rel="stylesheet" href="main.css">

  <style>
    body {
      background: white;
    }

    .cv-container {
      max-width: 900px;
      margin: 30px auto;
      padding: 25px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #fff3b0;
      padding-bottom: 15px;
      margin-bottom: 15px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .profile img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #fff3b0;
    }

    .name {
      font-size: 22px;
      font-weight: 700;
    }

    .title {
      font-size: 13px;
      color: #666;
    }

    .contact a {
      display: block;
      font-size: 12px;
      color: #333;
      text-decoration: none;
    }

    .section {
      margin-bottom: 18px;
    }

    .section h2 {
      font-size: 16px;
      border-left: 4px solid #fff3b0;
      padding-left: 8px;
      margin-bottom: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .stat {
      background: #fffef9;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
    }

    .job {
      margin-bottom: 10px;
    }

    .job-title {
      font-weight: 600;
      font-size: 14px;
    }

    ul {
      margin: 5px 0 8px 18px;
    }

    li {
      font-size: 13px;
      margin-bottom: 3px;
    }

    .skills span {
      display: inline-block;
      background: #fff3b0;
      padding: 4px 8px;
      margin: 3px;
      border-radius: 999px;
      font-size: 11px;
    }

    @media print {
      body { margin: 0; }
      .cv-container { margin: 0; }
    }
  </style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
<body>

<div class="cv-container" id="cv"></div>

<script src="cv-data.js"></script>

<script>
function renderCV() {

  const c = CV_DATA;
  const el = document.getElementById("cv");

  el.innerHTML = `

    <div class="header">

      <div class="profile">
        <img src="${c.personal.photo}">
        <div>
          <div class="name">${c.personal.name}</div>
          <div class="title">${c.personal.title}</div>
        </div>
      </div>

      <div class="contact">
        <a href="mailto:${c.personal.email}">${c.personal.email}</a>
        <a href="${c.personal.linkedin}">LinkedIn</a>
        <a href="${c.personal.github}">GitHub</a>
      </div>

    </div>

    <div class="section">
      <h2>Profile</h2>
      <p>${c.personal.summary}</p>
    </div>

    <div class="section">
      <h2>Key Stats</h2>
      <div class="grid">
        ${c.stats.map(s => `
          <div class="stat">
            <strong>${s.value}</strong><br>
            ${s.label}
          </div>
        `).join("")}
      </div>
    </div>

    <div class="section">
      <h2>Experience</h2>
      ${c.experience.map(e => `
        <div class="job">
          <div class="job-title">${e.role} — ${e.company}</div>
          <div style="font-size:11px;color:#666;">${e.dates}</div>
          <ul>
            ${e.bullets.map(b => `<li>${b}</li>`).join("")}
          </ul>
        </div>
      `).join("")}
    </div>

    <div class="section">
      <h2>Achievements</h2>
      <ul>
        ${c.achievements.map(a => `
          <li><strong>${a.title}:</strong> ${a.text}</li>
        `).join("")}
      </ul>
    </div>

    <div class="section">
      <h2>Skills</h2>
      <div class="skills">
        ${c.skills.tools.map(s => `<span>${s}</span>`).join("")}
      </div>
    </div>

    <div class="section grid">
      <div>
        <h2>Languages</h2>
        <ul>
          ${c.languages.map(l => `<li>${l.lang} — ${l.level}</li>`).join("")}
        </ul>
      </div>

      <div>
        <h2>Interests</h2>
        <ul>
          ${c.interests.map(i => `<li>${i}</li>`).join("")}
        </ul>
      </div>
    </div>

  `;
}

renderCV();
</script>

</body>
</html>

<script>
function downloadPDF() {

  const element = document.getElementById("cv");

  const options = {
    margin:       0.3,
    filename:     "Cassandra-Davis-CV.pdf",
    image:        { type: "jpeg", quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true },
    jsPDF:        { unit: "in", format: "a4", orientation: "portrait" }
  };

  html2pdf().set(options).from(element).save();
}
</script>
