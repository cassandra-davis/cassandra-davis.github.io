<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CV - Cassandra Davis</title>
  <link rel="stylesheet" href="main.css">

  <style>
    /* CV-specific print optimisation */
    @media print {
      body {
        margin: 0;
        background: white;
      }

      .sidebar {
        display: none;
      }

      .page {
        width: 100%;
        margin: 0;
        box-shadow: none;
      }
    }

    .cv-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #fff3b0;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .name {
      font-size: 28px;
      font-weight: bold;
    }

    .title {
      color: #666;
      margin-top: 5px;
    }

    .contact a {
      display: block;
      font-size: 14px;
      color: #333;
      text-decoration: none;
    }

    .section {
      margin-bottom: 25px;
    }

    .section h2 {
      border-left: 5px solid #fff3b0;
      padding-left: 10px;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: #fffef9;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .job {
      margin-bottom: 15px;
    }

    .job-title {
      font-weight: bold;
    }

    ul {
      margin: 5px 0 10px 20px;
    }

    .skills span {
      display: inline-block;
      background: #fff3b0;
      padding: 5px 10px;
      margin: 4px;
      border-radius: 999px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="cv-container" id="cv"></div>

<script src="cv-data.js"></script>

<script>
function renderCV() {

  const c = CV_DATA;
  const el = document.getElementById("cv");

  el.innerHTML = `

    <div class="header">
      <div>
        <div class="name">${c.personal.name}</div>
        <div class="title">${c.personal.title}</div>
      </div>

      <div class="contact">
        <a href="mailto:${c.personal.email}">${c.personal.email}</a>
        <a href="${c.personal.linkedin}">LinkedIn</a>
        <a href="${c.personal.github}">GitHub</a>
      </div>
    </div>

    <div class="section">
      <h2>Profile</h2>
      <p>${c.personal.summary}</p>
    </div>

    <div class="section">
      <h2>Key Stats</h2>
      <div class="grid-2">
        ${c.stats.map(s => `
          <div class="stat">
            <strong>${s.value}</strong><br>
            ${s.label}
          </div>
        `).join("")}
      </div>
    </div>

    <div class="section">
      <h2>Experience</h2>
      ${c.experience.map(e => `
        <div class="job">
          <div class="job-title">${e.role} — ${e.company}</div>
          <div style="font-size:12px;color:#666;">${e.dates}</div>
          <ul>
            ${e.bullets.map(b => `<li>${b}</li>`).join("")}
          </ul>
        </div>
      `).join("")}
    </div>

    <div class="section">
      <h2>Achievements</h2>
      <ul>
        ${c.achievements.map(a => `<li><strong>${a.title}:</strong> ${a.text}</li>`).join("")}
      </ul>
    </div>

    <div class="section">
      <h2>Skills</h2>
      <div class="skills">
        ${c.skills.tools.map(t => `<span>${t}</span>`).join("")}
      </div>
    </div>

    <div class="section grid-2">
      <div>
        <h2>Languages</h2>
        <ul>
          ${c.languages.map(l => `<li>${l.lang} — ${l.level}</li>`).join("")}
        </ul>
      </div>

      <div>
        <h2>Interests</h2>
        <ul>
          ${c.interests.map(i => `<li>${i}</li>`).join("")}
        </ul>
      </div>
    </div>

  `;
}

renderCV();
</script>

</body>
</html>
