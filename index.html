<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cassandra Davis | Engineering Systems & Documentation</title>

  <link rel="stylesheet" href="main.css">

  <!-- PDF LIBRARY -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="sidebar-header">
    <div class="logo">
      <img src="assets/monogram_logo.svg" alt="Cassandra Davis logo">
    </div>

    <h2>Cassandra Davis</h2>

    <p>Engineer • Analyst • Technical Communicator</p>
  </div>

  <nav class="sidebar-nav">
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#projects">Projects</a>
    <a href="#tools">Tools</a>
    <a href="#about-me">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- PDF BUTTON -->
  <a href="#" class="download-button"
     onclick="downloadPDF('portfolio-content', 'Cassandra-Davis-Portfolio.pdf')">
    Export Portfolio (PDF)
  </a>

  <a href="cv.html" target="_blank" class="download-button">
    Open CV
  </a>

  <div class="sidebar-footer">
    <p>© 2026 Cassandra Davis</p>
  </div>

</div>

<!-- EVERYTHING TO EXPORT -->
<div id="portfolio-content"></div>

<!-- PDF SCRIPT -->
<script>
function downloadPDF(elementId, filename) {

  const element = document.getElementById(elementId);

  if (!element) return;
  const mainContent = element.querySelector('.main-content');
  const originalMargin = mainContent ? mainContent.style.marginLeft : '';
  const originalWidth = mainContent ? mainContent.style.width : '';
  if (mainContent) {
    mainContent.style.marginLeft = '0';
    mainContent.style.width = '100%';
  }

  const opt = {
    margin: 0.15,
    filename: filename,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 1, useCORS: true, scrollY: 0 },
    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
  };

  element.classList.add('pdf-export');
  const pdfStyle = document.createElement('style');
  pdfStyle.id = 'pdf-export-temp';
  pdfStyle.textContent = `
    .pdf-export { background: #ffffff !important; color: #333 !important; font-size: 0.92rem !important; width: 780px !important; max-width: 780px !important; }
    .pdf-export .main-content { margin-left: 0 !important; padding: 1rem !important; width: 100% !important; }
    .pdf-export section { background: #ffffff !important; box-shadow: none !important; border: 1px solid #e6e6e6 !important; border-radius: 12px !important; margin-bottom: 1rem !important; padding: 1rem !important; }
    .pdf-export h1 { font-size: 1.8rem !important; }
    .pdf-export h2 { font-size: 1.2rem !important; }
    .pdf-export h3 { font-size: 1rem !important; }
    .pdf-export p, .pdf-export li, .pdf-export span, .pdf-export a { font-size: 0.88rem !important; }
    .pdf-export .hero-content { display: block !important; gap: 0 !important; }
    .pdf-export .hero-image, .pdf-export .hero-text { flex: none !important; width: 100% !important; }
    .pdf-export .hero-image img { width: 160px !important; height: 160px !important; }
    .pdf-export .tags span { padding: 4px 8px !important; font-size: 0.8rem !important; }
    .pdf-export .stats-grid, .pdf-export .services-grid, .pdf-export .project-grid, .pdf-export .tool-grid { grid-template-columns: 1fr !important; }
    .pdf-export .stat-card, .pdf-export .service-box, .pdf-export .project-box, .pdf-export .tool-grid div { padding: 1rem !important; background: #ffffff !important; background-image: none !important; box-shadow: none !important; border: 1px solid #e6e6e6 !important; }
    .pdf-export .project-box img { max-width: 100% !important; height: auto !important; }
    .pdf-export .download-button, .pdf-export .sidebar, .pdf-export .sidebar-nav { display: none !important; }
    .pdf-export .contact { background: #ffffff !important; }
    .pdf-export .button { display: none !important; }
    .pdf-export img { max-width: 100% !important; height: auto !important; }
    .pdf-export h1, .pdf-export h2, .pdf-export h3, .pdf-export h4 { page-break-after: avoid; }
    .pdf-export section { page-break-inside: avoid; }
  `;
  document.head.appendChild(pdfStyle);

  html2pdf().set(opt).from(element).save().then(() => {
    element.classList.remove('pdf-export');
    if (pdfStyle && pdfStyle.parentNode) {
      pdfStyle.parentNode.removeChild(pdfStyle);
    }
    if (mainContent) {
      mainContent.style.marginLeft = originalMargin;
      mainContent.style.width = originalWidth;
    }
  });
}
</script>
  
<script src="cv-data.js"></script>

<script>
function renderPortfolio() {
  const c = window.CV_DATA || (typeof CV_DATA !== 'undefined' ? CV_DATA : null);
  if (!c) { console.warn('CV_DATA not found'); return; }
  const container = document.getElementById('portfolio-content');
  if (!container) return;
  const skills = c.skills || {};
  const hero = c.hero || {};
  const tags = (hero.tags && hero.tags.length) ? hero.tags.slice(0,6) : ((skills.tools && skills.tools.length) ? skills.tools.slice(0, 6) : (c.interests || []).slice(0, 6));
  const statsHtml = (c.stats_portfolio || c.stats || []).map(s => `<div class="stat-card"><h2>${s.value}</h2><p>${s.label}</p></div>`).join('');
  const servicesHtml = (c.services || []).map(sv => `<div class="service-box"><h3>${sv.title}</h3><p>${sv.text}</p></div>`).join('');
  const projectsHtml = (c.projects || []).map(pr => `
      <a href="${pr.link || '#'}" class="project-box" target="${pr.link && pr.link.startsWith('http') ? '_blank' : ''}">
        ${pr.image ? `<img src="${pr.image}" alt="${pr.title}">` : ''}
        <h3>${pr.title}</h3>
        <p>${pr.text}</p>
      </a>
    `).join('');
  const toolsHtml = (skills.tools || []).map(t => `<div>${t}</div>`).join('');
  const aboutMethods = (skills.methods || []).map(m => `<li>${m}</li>`).join('');
  const interestsHtml = (c.interests || []).map(i => `<li>${i}</li>`).join('');

  container.innerHTML = `
    <div class="main-content">
      
      <section class="hero" id="home">
        <div class="hero-content">
          <div class="hero-text">
            <h1>${hero.headline || 'Building Clarity from Complexity'}</h1>
            <p class="hero-subtitle">${hero.subtitle || c.personal.title || ''}</p>
            ${ (hero.paragraphs || []).map(p => `<p>${p}</p>`).join('') }
            <div class="tags">${tags.map(t => `<span>${t}</span>`).join('')}</div>
          </div>
          <div class="hero-image">
            <img src="${c.personal.photo || 'profile.png'}" alt="${c.personal.name}">
          </div>
        </div>
      </section>

      <section class="stats-section">
        <div class="stats-grid">${statsHtml}</div>
      </section>

      <section id="services">
        <h1>Services</h1>
        <div class="services-grid">${servicesHtml}</div>
      </section>

      <section id="projects">
        <h1>Selected Projects</h1>
        <div class="project-grid">${projectsHtml}</div>
      </section>

      <section id="tools">
        <h1>Tools & Technologies</h1>
        <div class="tool-grid">${toolsHtml}</div>
      </section>

      <section class="about-me" id="about-me">
        <h1>${(c.about_portfolio && c.about_portfolio.heading) || 'About Me'}</h1>
        ${ (c.about_portfolio && c.about_portfolio.paragraphs ? c.about_portfolio.paragraphs.map(p => `<p>${p}</p>`).join('') : `<p>${c.personal.summary || ''}</p><p>I focus on building structured systems that turn engineering complexity into clarity.</p>` ) }
        <ul>
          ${ (c.about_portfolio && c.about_portfolio.bullets ? c.about_portfolio.bullets.map(b => `<li>${b}</li>`).join('') : aboutMethods) }
        </ul>
        <h2>Currently Exploring</h2>
        <ul>
          ${ (c.about_portfolio && c.about_portfolio.exploring ? c.about_portfolio.exploring.map(i => `<li>${i}</li>`).join('') : interestsHtml) }
        </ul>
      </section>

      <section class="contact" id="contact">
        <h1>Let's Connect</h1>
        <p>Open to freelance work in engineering documentation, reporting systems, and automation.</p>
        <p>📫 <a href="mailto:${c.personal.email}">Email</a> | <a href="${c.personal.linkedin}">LinkedIn</a> | <a href="${c.personal.github}">GitHub</a></p>
      </section>

    </div>
  `;
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderPortfolio);
} else {
  renderPortfolio();
}
</script>

</body>
</html>
