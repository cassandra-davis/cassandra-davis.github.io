project:
  type: default
  output-dir: output

execute:
  echo: false
  warning: false
  message: false
  freeze: auto
  cache: true

format:

  html:
    toc: true
    toc-depth: 3
    number-sections: true
    theme: cosmo

  pdf:
    pdf-engine: xelatex
    keep-tex: true
    toc: true
    number-sections: true
    include-in-header:
      - templates/in-header.tex
    template-partials:
      - templates/before-body.tex

  docx:
    toc: true
    number-sections: true
    reference-doc: templates/reference.docx

metadata:
