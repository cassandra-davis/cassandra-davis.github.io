project:
  type: default
  output-dir: output

execute:
  echo: false
  warning: false
  message: false
  freeze: auto
  cache: true

format:

  html:
    toc: true
    toc-depth: 3
    number-sections: true
    theme: cosmo

  pdf:
    toc: true
    number-sections: true

  docx:
    toc: true
    number-sections: true
    reference-doc: templates/engineering-reference.docx